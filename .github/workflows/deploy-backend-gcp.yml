# Auto-deploy backend to Google Cloud Run on push to main
# Setup: Add GitHub secret GCP_SA_KEY with the JSON content of a GCP service account key
# that has Cloud Build Editor + Cloud Run Admin (or roles/run.admin, roles/cloudbuild.builds.builder).
name: Deploy Backend to GCP

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:  # Allow manual run from Actions tab

env:
  GCP_PROJECT_ID: dots-488014
  SERVICE_NAME: dots-backend
  GCP_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Build and push Docker image
        run: |
          gcloud builds submit ./backend \
            --tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }} \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 10 \
            --update-env-vars "DEBUG=False" \
            --quiet

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "✅ Backend deployed: $URL"
