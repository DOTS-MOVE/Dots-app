# Production deploy: build frontend + backend, push to GCR, run Terraform (prod only).
# Requires: GitHub secrets GCP_SA_KEY; vars FRONTEND_DOMAIN, BACKEND_DOMAIN, GCP_PROJECT_ID, GCP_REGION.
name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "infra/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'dots-488014' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  REGISTRY_URL: gcr.io/${{ env.GCP_PROJECT_ID }}
  FRONTEND_IMAGE: ${{ env.REGISTRY_URL }}/dots-frontend
  BACKEND_IMAGE: ${{ env.REGISTRY_URL }}/dots-backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend test
        run: npm run test
        working-directory: frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Backend test
        run: pytest -q
        working-directory: backend

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Docker auth (GCR)
        run: gcloud auth configure-docker --quiet

      - name: Build and push frontend
        id: frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.BACKEND_URL }} \
            -f frontend/Dockerfile frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Get image digests
        id: digests
        run: |
          docker pull ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} 2>/dev/null || true
          docker pull ${{ env.BACKEND_IMAGE }}:${{ github.sha }} 2>/dev/null || true
          FRONTEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} 2>/dev/null | sed 's/.*@//' || echo "")
          BACKEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.BACKEND_IMAGE }}:${{ github.sha }} 2>/dev/null | sed 's/.*@//' || echo "")
          if [ -z "$FRONTEND_DIGEST" ]; then FRONTEND_DIGEST=$(gcloud container images describe ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} --format='get(image_summary.digest)' 2>/dev/null); fi
          if [ -z "$BACKEND_DIGEST" ]; then BACKEND_DIGEST=$(gcloud container images describe ${{ env.BACKEND_IMAGE }}:${{ github.sha }} --format='get(image_summary.digest)' 2>/dev/null); fi
          echo "frontend_digest=$FRONTEND_DIGEST" >> $GITHUB_OUTPUT
          echo "backend_digest=$BACKEND_DIGEST" >> $GITHUB_OUTPUT

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init -input=false

      - name: Terraform apply (prod only)
        working-directory: infra
        run: |
          terraform apply -auto-approve -input=false \
            -var="gcp_project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="registry_url=${{ env.REGISTRY_URL }}" \
            -var="frontend_image_sha=${{ steps.digests.outputs.frontend_digest }}" \
            -var="backend_image_sha=${{ steps.digests.outputs.backend_digest }}" \
            -var="frontend_domain=${{ vars.FRONTEND_DOMAIN }}" \
            -var="backend_domain=${{ vars.BACKEND_DOMAIN }}" \
            -var="staging_frontend_domain=" \
            -var="staging_backend_domain="

      - name: Show LB IP
        working-directory: infra
        run: terraform output -raw load_balancer_ip
