# Staging deploy: build with staging env, unique image tags, run staging DB migrations, Terraform apply (staging targets only).
# Requires: GitHub secrets GCP_SA_KEY, STAGING_DATABASE_URL (or STAGING_SUPABASE_DATABASE_URL for Alembic);
#           vars STAGING_FRONTEND_DOMAIN, STAGING_BACKEND_DOMAIN, STAGING_FRONTEND_URL, STAGING_BACKEND_URL, etc.
name: Deploy Staging

on:
  push:
    branches: [dev]
    paths:
      - "frontend/**"
      - "backend/**"
      - "infra/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'dots-488014' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  REGISTRY_URL: gcr.io/${{ env.GCP_PROJECT_ID }}
  FRONTEND_IMAGE: ${{ env.REGISTRY_URL }}/dots-frontend
  BACKEND_IMAGE: ${{ env.REGISTRY_URL }}/dots-backend
  # Unique tag per run to avoid registry tag immutability
  STAGING_TAG: ${{ github.sha }}-staging-${{ github.run_id }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend test
        run: npm run test
        working-directory: frontend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Backend test
        run: pytest -q
        working-directory: backend

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Docker auth (GCR)
        run: gcloud auth configure-docker --quiet

      - name: Build and push frontend (staging)
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ env.STAGING_TAG }} \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ vars.STAGING_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ vars.STAGING_SUPABASE_PUBLISHABLE_DEFAULT_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ vars.STAGING_BACKEND_URL }} \
            -f frontend/Dockerfile frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ env.STAGING_TAG }}

      - name: Build and push backend (staging)
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ env.STAGING_TAG }} backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ env.STAGING_TAG }}

      - name: Get staging image digests
        id: digests
        run: |
          docker pull ${{ env.FRONTEND_IMAGE }}:${{ env.STAGING_TAG }} 2>/dev/null || true
          docker pull ${{ env.BACKEND_IMAGE }}:${{ env.STAGING_TAG }} 2>/dev/null || true
          FRONTEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.FRONTEND_IMAGE }}:${{ env.STAGING_TAG }} 2>/dev/null | sed 's/.*@//' || echo "")
          BACKEND_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.BACKEND_IMAGE }}:${{ env.STAGING_TAG }} 2>/dev/null | sed 's/.*@//' || echo "")
          if [ -z "$FRONTEND_DIGEST" ]; then FRONTEND_DIGEST=$(gcloud container images describe ${{ env.FRONTEND_IMAGE }}:${{ env.STAGING_TAG }} --format='get(image_summary.digest)' 2>/dev/null); fi
          if [ -z "$BACKEND_DIGEST" ]; then BACKEND_DIGEST=$(gcloud container images describe ${{ env.BACKEND_IMAGE }}:${{ env.STAGING_TAG }} --format='get(image_summary.digest)' 2>/dev/null); fi
          echo "frontend_digest=$FRONTEND_DIGEST" >> $GITHUB_OUTPUT
          echo "backend_digest=$BACKEND_DIGEST" >> $GITHUB_OUTPUT

      - name: Run migrations (staging Supabase DB)
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -n "$DATABASE_URL" ]; then
            cd backend && pip install -q -r requirements.txt && alembic upgrade head
          else
            echo "STAGING_DATABASE_URL not set; skipping migrations."
          fi

      - name: Get prod image digests (so Terraform does not change prod)
        id: prod_digests
        run: |
          PROD_FRONTEND=$(gcloud run services describe frontend --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
          PROD_BACKEND=$(gcloud run services describe backend --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "")
          PROD_FRONTEND_DIGEST=$(echo "$PROD_FRONTEND" | sed 's/.*@//')
          PROD_BACKEND_DIGEST=$(echo "$PROD_BACKEND" | sed 's/.*@//')
          echo "frontend_digest=$PROD_FRONTEND_DIGEST" >> $GITHUB_OUTPUT
          echo "backend_digest=$PROD_BACKEND_DIGEST" >> $GITHUB_OUTPUT

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform apply (staging targets only)
        working-directory: infra
        run: |
          STAGING_BACKEND_URL="${{ vars.STAGING_BACKEND_URL }}"
          STAGING_FRONTEND_URL="${{ vars.STAGING_FRONTEND_URL }}"
          STAGING_ENV="{\"API_URL\"=\"${STAGING_BACKEND_URL}\",\"WEBSITE_URL\"=\"${STAGING_FRONTEND_URL}\",\"DEPLOYMENT_ENV\"=\"staging\"}"
          terraform apply -auto-approve -input=false \
            -var="gcp_project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -var="registry_url=${{ env.REGISTRY_URL }}" \
            -var="frontend_image_sha=${{ steps.prod_digests.outputs.frontend_digest }}" \
            -var="backend_image_sha=${{ steps.prod_digests.outputs.backend_digest }}" \
            -var="frontend_domain=${{ vars.FRONTEND_DOMAIN }}" \
            -var="backend_domain=${{ vars.BACKEND_DOMAIN }}" \
            -var="staging_frontend_domain=${{ vars.STAGING_FRONTEND_DOMAIN }}" \
            -var="staging_backend_domain=${{ vars.STAGING_BACKEND_DOMAIN }}" \
            -var="staging_frontend_image_sha=${{ steps.digests.outputs.frontend_digest }}" \
            -var="staging_backend_image_sha=${{ steps.digests.outputs.backend_digest }}" \
            -var="staging_backend_env=${STAGING_ENV}" \
            -target=google_cloud_run_v2_service.frontend_staging \
            -target=google_cloud_run_v2_service.backend_staging \
            -target=google_cloud_run_v2_service_iam_member.frontend_staging_invoker \
            -target=google_cloud_run_v2_service_iam_member.backend_staging_invoker \
            -target=google_compute_region_network_endpoint_group.frontend_staging_neg \
            -target=google_compute_region_network_endpoint_group.backend_staging_neg \
            -target=google_compute_backend_service.frontend_staging \
            -target=google_compute_backend_service.backend_staging \
            -target=google_compute_url_map.main

      - name: Show staging URLs
        run: |
          echo "Staging frontend: ${{ vars.STAGING_FRONTEND_URL }}"
          echo "Staging backend:  ${{ vars.STAGING_BACKEND_URL }}"
